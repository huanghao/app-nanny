<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>nanny</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23252526'/><polyline points='7,25 7,7 20,25 20,7' fill='none' stroke='%234ec9b0' stroke-width='3.5' stroke-linecap='round' stroke-linejoin='round'/></svg>">
  <style>
    body { font-family: monospace; background: #1a1a1a; color: #d4d4d4; margin: 0; padding: 0; }
    header { background: #252526; padding: 12px 20px; border-bottom: 1px solid #3c3c3c; display: flex; align-items: center; gap: 12px; }
    header h1 { margin: 0; font-size: 16px; color: #9cdcfe; }
    #status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ec9b0; display: inline-block; }
    #daemon-version { color: #585858; font-size: 11px; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th { text-align: left; padding: 8px 12px; background: #252526; color: #858585; font-weight: normal; border-bottom: 1px solid #3c3c3c; }
    td { padding: 6px 12px; border-bottom: 1px solid #2d2d2d; vertical-align: middle; }
    tbody tr { cursor: pointer; }
    tbody tr:hover td { background: #2a2a2a; }
    tbody tr.active-log td { background: #1f2d2d; }
    .running { color: #4ec9b0; }
    .stopped { color: #585858; }
    .crashed { color: #f48771; }
    .btn { background: #3c3c3c; border: none; color: #d4d4d4; padding: 3px 10px; cursor: pointer; border-radius: 3px; font-family: monospace; font-size: 12px; margin: 0 2px; }
    .btn:hover { background: #505050; }
    a.port-link { color: #4ec9b0; text-decoration: none; }
    a.port-link:hover { text-decoration: underline; color: #7de8d0; }
    .port-dim { color: #484848; }
    .cwd { color: #444; font-size: 10px; margin-top: 2px; max-width: 220px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

    /* Log panel */
    #log-panel { position: fixed; bottom: 0; left: 0; right: 0; background: #1e1e1e; border-top: 1px solid #3c3c3c; display: flex; flex-direction: column; }
    #log-resize { height: 6px; cursor: row-resize; background: #2d2d2d; flex-shrink: 0; position: relative; }
    #log-resize::after { content: ''; position: absolute; left: 50%; top: 50%; transform: translate(-50%,-50%); width: 32px; height: 2px; border-radius: 1px; background: #555; }
    #log-resize:hover, #log-resize.dragging { background: #1e3a3a; }
    #log-resize:hover::after, #log-resize.dragging::after { background: #4ec9b0; }
    #log-header { background: #252526; padding: 6px 12px; font-size: 12px; color: #858585; display: flex; justify-content: space-between; flex-shrink: 0; }
    #log-body { flex: 1; overflow-y: auto; padding: 8px 12px; font-size: 12px; line-height: 1.6; min-height: 0; }
    #log-body .err { color: #f48771; }
    .main { /* padding-bottom set by JS */ }
  </style>
</head>
<body>
<header>
  <span id="status-dot"></span>
  <h1>nanny</h1>
  <span id="daemon-version"></span>
  <span id="daemon-status" style="color:#858585;font-size:12px">loading...</span>
</header>
<div class="main" id="main">
  <table>
    <thead><tr>
      <th>PROJECT</th><th>PROCESS</th><th>PORTS</th><th>STATUS</th>
      <th>PID</th><th>UPTIME</th><th>MEM</th><th>ACTIONS</th>
    </tr></thead>
    <tbody id="proc-body"></tbody>
  </table>
</div>
<div id="log-panel">
  <div id="log-resize"></div>
  <div id="log-header">
    <span id="log-title">logs — click a service row</span>
    <span><button class="btn" onclick="clearLog()">clear</button></span>
  </div>
  <div id="log-body"></div>
</div>
<script>
let eventSource = null;
let activeKey  = null;

// ── Log panel resize ─────────────────────────────────────────────────────────
const LS_HEIGHT = 'nanny-log-height';
const DEFAULT_H = 380;
const MIN_H = 80;
const MAX_H = () => Math.floor(window.innerHeight * 0.85);

function applyH(h) {
  h = Math.max(MIN_H, Math.min(MAX_H(), h));
  document.getElementById('log-panel').style.height = h + 'px';
  document.getElementById('main').style.paddingBottom = (h + 8) + 'px';
  return h;
}

(function setupResize() {
  const saved = parseInt(localStorage.getItem(LS_HEIGHT), 10);
  applyH(saved > 0 ? saved : DEFAULT_H);

  const handle = document.getElementById('log-resize');
  let drag = false, startY = 0, startH = 0;

  handle.addEventListener('mousedown', e => {
    drag = true; startY = e.clientY;
    startH = document.getElementById('log-panel').offsetHeight;
    handle.classList.add('dragging');
    document.body.style.cursor = 'row-resize';
    document.body.style.userSelect = 'none';
    e.preventDefault();
  });
  document.addEventListener('mousemove', e => {
    if (!drag) return;
    applyH(startH + (startY - e.clientY));
  });
  document.addEventListener('mouseup', () => {
    if (!drag) return;
    drag = false;
    handle.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
    localStorage.setItem(LS_HEIGHT, document.getElementById('log-panel').offsetHeight);
  });
})();

// ── Daemon version ───────────────────────────────────────────────────────────
async function loadVersion() {
  try {
    const r = await fetch('/api/version');
    const d = await r.json();
    document.getElementById('daemon-version').textContent = 'v' + d.version;
  } catch(e) {}
}
loadVersion();

// ── Helpers ──────────────────────────────────────────────────────────────────
function shortenPath(p) {
  // Replace home directory prefix with ~
  const home = location.hostname === 'localhost' ? null : null; // can't know home in browser
  // Just show last 3 path segments
  const parts = p.replace(/\\/g, '/').split('/').filter(Boolean);
  if (parts.length <= 3) return p;
  return '…/' + parts.slice(-3).join('/');
}

function portsHTML(p) {
  const actual = p.actual_ports || [];
  const declared = p.declared_port || 0;
  if (actual.length > 0) {
    return actual.map(port =>
      `<a class="port-link" href="http://localhost:${port}" target="_blank" onclick="event.stopPropagation()">${port}</a>`
    ).join('&nbsp;');
  }
  if (declared > 0) {
    if (p.status === 'running') {
      return `<a class="port-link" href="http://localhost:${declared}" target="_blank" onclick="event.stopPropagation()">${declared}</a>`
           + `&nbsp;<span class="port-dim">(starting)</span>`;
    }
    return `<span class="port-dim">${declared}</span>`;
  }
  return '<span class="port-dim">—</span>';
}

function actionsHTML(key) {
  const s = `onclick="event.stopPropagation()"`;
  return `<button class="btn" ${s} onclick="doAction('${key}','start');event.stopPropagation()" title="start">&#9654;</button>`
       + `<button class="btn" ${s} onclick="doAction('${key}','stop');event.stopPropagation()" title="stop">&#9632;</button>`
       + `<button class="btn" ${s} onclick="doAction('${key}','restart');event.stopPropagation()" title="restart">&#8634;</button>`;
}

function setText(td, text) { if (td.textContent !== String(text)) td.textContent = text; }
function setHTML(td, html)  { if (td.innerHTML !== html) td.innerHTML = html; }
function setClass(td, cls)  { if (td.className !== cls) td.className = cls; }

// ── Process table ────────────────────────────────────────────────────────────
async function loadPS() {
  try {
    const r = await fetch('/api/ps');
    const data = await r.json();
    const processes = data.processes || [];

    processes.sort((a, b) => {
      const ka = a.project + '\0' + (a.process || '');
      const kb = b.project + '\0' + (b.process || '');
      return ka < kb ? -1 : ka > kb ? 1 : 0;
    });

    const tbody = document.getElementById('proc-body');
    const rowMap = new Map();
    for (const tr of tbody.querySelectorAll('tr[data-key]')) rowMap.set(tr.dataset.key, tr);

    processes.forEach((p, i) => {
      const key = p.process ? `${p.project}/${p.process}` : p.project;
      const mem = p.mem_mb > 0 ? p.mem_mb.toFixed(0) + 'M' : '—';
      const cwd = p.work_dir ? shortenPath(p.work_dir) : '';

      let tr = rowMap.get(key);
      if (!tr) {
        tr = document.createElement('tr');
        tr.dataset.key = key;
        // 8 columns: PROJECT | PROCESS | PORTS | STATUS | PID | UPTIME | MEM | ACTIONS
        for (let c = 0; c < 8; c++) tr.appendChild(document.createElement('td'));
        tr.querySelectorAll('td')[7].innerHTML = actionsHTML(key);
        // Row click → show logs
        tr.addEventListener('click', () => streamLogs(key));
      }
      rowMap.delete(key);

      // Highlight active log row
      if (key === activeKey) tr.classList.add('active-log');
      else tr.classList.remove('active-log');

      const cells = tr.querySelectorAll('td');
      // PROJECT + cwd subtitle
      const projHTML = `<div>${p.project}</div>`
        + (cwd ? `<div class="cwd" title="${p.work_dir}">${cwd}</div>` : '');
      setHTML(cells[0], projHTML);
      setText(cells[1], p.process || '—');
      setHTML(cells[2], portsHTML(p));       // PORTS (3rd)
      setClass(cells[3], p.status);
      setText(cells[3], p.status);           // STATUS (4th)
      setText(cells[4], p.pid || '—');
      setText(cells[5], p.uptime || '—');
      setText(cells[6], mem);
      // actions[7] set once at row creation

      const sibling = tbody.children[i];
      if (sibling !== tr) tbody.insertBefore(tr, sibling || null);
    });

    for (const tr of rowMap.values()) tr.remove();

    document.getElementById('daemon-status').textContent = 'daemon: running';
    document.getElementById('status-dot').style.background = '#4ec9b0';
  } catch(e) {
    document.getElementById('daemon-status').textContent = 'daemon: error';
    document.getElementById('status-dot').style.background = '#f48771';
  }
}

async function doAction(key, act) {
  const parts = key.split('/');
  const url = parts.length === 2
    ? `/api/${parts[0]}/${parts[1]}/${act}`
    : `/api/${key}/${act}`;
  await fetch(url, { method: 'POST' });
  setTimeout(loadPS, 400);
}

function streamLogs(key) {
  if (eventSource) eventSource.close();
  activeKey = key;
  document.getElementById('log-title').textContent = 'logs — ' + key;
  const logBody = document.getElementById('log-body');
  logBody.innerHTML = '';

  // Update row highlight immediately
  for (const tr of document.querySelectorAll('tr[data-key]')) {
    tr.classList.toggle('active-log', tr.dataset.key === key);
  }

  const sseKey = key.replace('/', '-');
  eventSource = new EventSource('/api/logs/' + sseKey + '/stream');
  eventSource.onmessage = e => {
    const line = document.createElement('div');
    if (/\b5\d{2}\b|Error:|panic:|FATAL/i.test(e.data)) line.className = 'err';
    line.textContent = e.data;
    logBody.appendChild(line);
    logBody.scrollTop = logBody.scrollHeight;
  };
}

function clearLog() {
  document.getElementById('log-body').innerHTML = '';
}

loadPS();
setInterval(loadPS, 3000);
</script>
</body>
</html>
